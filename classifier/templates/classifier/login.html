{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>No account? <a href="{% url 'signup' %}">Create one</a></p>
</div>
{% endblock %}
